services:
  redis:
    image: redis:7-alpine
    container_name: edurag-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2025-02-18T16-25-55Z
    container_name: edurag-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 20s

  minio-init:
    image: minio/mc:latest
    container_name: edurag-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $${MINIO_ROOT_USER:-minioadmin} $${MINIO_ROOT_PASSWORD:-minioadmin};
      mc mb --ignore-existing local/$${MINIO_BUCKET:-edurag-reports};
      echo 'Bucket ready';
      "
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-edurag-reports}

  llm-service:
    build:
      context: ./llm_service
      dockerfile: Dockerfile
    container_name: edurag-llm
    env_file:
      - ./llm_service/.env
    environment:
      SUPABASE_URL: ${SUPABASE_URL:-}
      SUPABASE_KEY: ${SUPABASE_KEY:-}
      PINECONE_API_KEY: ${PINECONE_API_KEY:-}
    ports:
      - "${LLM_PORT:-5000}:5000"
    volumes:
      - ./llm_service:/app
      - llm_model_cache:/app/model_cache
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

  backend:
    build:
      context: ./BE
      dockerfile: Dockerfile
      target: development
    container_name: edurag-backend
    depends_on:
      minio:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    env_file:
      - ./BE/.env
    environment:
      NODE_ENV: development
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_USE_SSL: "false"
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_PUBLIC_URL: http://localhost:${MINIO_API_PORT:-9000}
      REDIS_URL: redis://redis:6379
      LLM_SERVICE_URL: http://llm-service:5000
      RAG_SERVICE_URL: http://llm-service:5000
    ports:
      - "${BACKEND_PORT:-3001}:3001"
    volumes:
      - ./BE:/app
      - /app/node_modules
    command: npm run dev

  worker:
    build:
      context: ./worker-python
      dockerfile: Dockerfile
    container_name: edurag-worker
    depends_on:
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    env_file:
      - ./worker-python/.env
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-edurag-reports}
      LLM_SERVICE_URL: http://llm-service:5000
    volumes:
      - ./worker-python:/app
    command: python main.py

  frontend:
    build:
      context: ./FE/client
      dockerfile: Dockerfile
    container_name: edurag-frontend
    depends_on:
      - backend
    environment:
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
      REACT_APP_API_URL: http://localhost:${BACKEND_PORT:-3001}/api
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    volumes:
      - ./FE/client:/app
      - /app/node_modules
    command: npm start

volumes:
  minio_data:
  redis_data:
  llm_model_cache:
