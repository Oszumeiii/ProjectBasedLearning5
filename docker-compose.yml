services:
  minio:
    image: minio/minio:RELEASE.2025-02-18T16-25-55Z
    container_name: edurag-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 20s

  backend:
    build:
      context: ./BE
      dockerfile: Dockerfile
      target: development
    container_name: edurag-backend
    depends_on:
      minio:
        condition: service_healthy
    env_file:
      - ./BE/.env
    environment:
      NODE_ENV: development
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_USE_SSL: "false"
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_PUBLIC_URL: http://localhost:${MINIO_API_PORT:-9000}
    ports:
      - "${BACKEND_PORT:-3301}:3001"
    volumes:
      - ./BE:/app
      - /app/node_modules
    command: npm run dev

  frontend:
    build:
      context: ./FE/client
      dockerfile: Dockerfile
    container_name: edurag-frontend
    depends_on:
      - backend
    environment:
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
      REACT_APP_API_URL: http://localhost:${BACKEND_PORT:-3301}/api
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    volumes:
      - ./FE/client:/app
      - /app/node_modules
    command: npm start

volumes:
  minio_data:
